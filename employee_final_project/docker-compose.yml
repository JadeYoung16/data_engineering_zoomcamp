version: '3.8'

# --- 1. The Template (Common Configuration) ---
x-airflow-common:
  &airflow-common
  build: .
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    &airflow-common-env
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__TEST_CONNECTION=Enabled
    # Credentials pulled from your .env file
    - KAGGLE_USERNAME=${KAGGLE_USERNAME}
    - KAGGLE_KEY=${KAGGLE_KEY}
    - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
    - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    - _PIP_ADDITIONAL_DEPENDENCIES=${_PIP_ADDITIONAL_DEPENDENCIES:-dbt-snowflake}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - .:/opt/airflow:z
    - ~/.dbt:/home/airflow/.dbt
    - ./employee_data_transformation:/opt/airflow/dbt/employee_data_transformation
  depends_on:
    - postgres

# --- 2. The Services ---
services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "sleep 15 && 
      airflow db init &&
      airflow users create --username airflow --password airflow --firstname Jade --lastname Analyst --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes

volumes:
  postgres_data:
  